services:
  ts-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    # env_file: ./.env  # Uncomment if .env file exists
    # Only expose ports if specified in documentation or Dockerfile
    # Add depends_on if external services are added below
    # networks:
    #   - appnet

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
