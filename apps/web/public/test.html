<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narrativee SDK Test</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f0f0f0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        button {
            background: #E75E26;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.2s;
        }

        button:hover {
            background: #b84315;
        }

        pre {
            background: #333;
            color: #fff;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>SDK Connection Test 🔌</h1>
        <p>Click below to fire an event to your local backend.</p>

        <div class="card" style="margin-bottom: 20px;">
            <h2>Configuration</h2>
            <div style="text-align: left; margin-bottom: 10px;">
                <label>API Key:</label>
                <input type="text" id="apiKeyInput" placeholder="Enter API Key"
                    style="width: 100%; padding: 8px; margin-top: 5px;">
            </div>
            <div style="text-align: left;">
                <label>User ID:</label>
                <input type="text" id="userIdInput" value="test-user-001" placeholder="test-user-001"
                    style="width: 100%; padding: 8px; margin-top: 5px;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
            <div class="card">
                <h2>Actions</h2>
                <div class="grid">
                    <button onclick="trackEvent('view_pricing')">Track 'view_pricing' (+4)</button>
                    <button onclick="trackEvent('invite_teammate')">Track 'invite_teammate' (+20)</button>
                </div>
                <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
                    <button onclick="resetUser()" style="background: #ef4444;">Reset User History 🔄</button>
                </div>
            </div>
        </div>

        <div id="status" style="margin-top: 20px; color: #666;"></div>
    </div>

    <!-- NARRATIVEE SDK -->
    <script src="/services/sdk.js" data-api-key="nr-live-a969db13-6a4e-42c4-825e-9101a32dffe8"></script>

    <script>
        function trackEvent(eventName) {
            const status = document.getElementById('status');
            status.innerText = "Sending...";

            const apiKey = document.getElementById('apiKeyInput').value;
            const userId = document.getElementById('userIdInput').value || 'test-user-001';

            if (!apiKey) {
                status.innerText = "❌ Please enter an API Key first!";
                status.style.color = "red";
                return;
            }

            fetch('http://localhost:3002/api/events/track', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey
                },
                body: JSON.stringify({
                    eventName: eventName,
                    userId: userId,
                    metadata: { plan: 'pro', source: 'test-page' }
                })
            })
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`HTTP error! status: ${res.status}`);
                    }
                    return res.json();
                })
                .then(data => {
                    console.log('Response:', data);
                    status.innerText = "✅ Event sent successfully! Check backend console.";
                    status.style.color = "green";
                    if (data.actions && data.actions.length > 0) {
                        // SDK handles dispatching, but we can also log here
                        console.log("Actions received in response:", data.actions);

                        // Dispatch event for client-side listeners
                        data.actions.forEach(action => {
                            const event = new CustomEvent('narrativee:action', { detail: action });
                            window.dispatchEvent(event);
                        });
                    }
                })
                .catch(err => {
                    console.error('Error sending event:', err);
                    status.innerText = `❌ Error sending event: ${err.message}`;
                    status.style.color = "red";
                });
        }

        function resetUser() {
            const status = document.getElementById('status');
            status.innerText = "Resetting user...";

            const apiKey = document.getElementById('apiKeyInput').value;
            const userId = document.getElementById('userIdInput').value || 'test-user-001';

            if (!apiKey) {
                status.innerText = "❌ Please enter an API Key first!";
                status.style.color = "red";
                return;
            }

            fetch(`http://localhost:3002/api/events/user/${userId}/reset`, {
                method: 'POST',
                headers: {
                    'x-api-key': apiKey
                }
            })
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`HTTP error! status: ${res.status}`);
                    }
                    return res.json();
                })
                .then(data => {
                    status.innerText = '✅ User Score and History Reset! 🔄';
                    status.style.color = "green";
                    console.log(data);
                })
                .catch(err => {
                    console.error('Error resetting user:', err);
                    status.innerText = `❌ Error resetting user: ${err.message}`;
                    status.style.color = "red";
                });
        }
    </script>
    <script>
        // Listen for Workflow Actions
        window.addEventListener('narrativee:action', (e) => {
            const action = e.detail;
            console.log('🔥 WORKFLOW FIRED:', action);

            if (action.type === 'component' || action.type === 'popup') {
                const id = action.config.componentId || action.config.message;
                alert(`✨ TRIGGERED: ${id}`);
            } else if (action.type === 'email') {
                alert(`📧 EMAIL SENT via ${action.config.provider}`);
            }
        });
    </script>
</body>

</html>
