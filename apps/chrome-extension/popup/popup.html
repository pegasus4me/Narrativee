<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">
        <div class="header">
            <span class="logo">🧙‍♂️</span>
            <h1>Substack Wizard</h1>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="settings">⚙️ Settings</button>
            <button class="tab" data-tab="profile">👤 My Profile</button>
        </div>

        <!-- Settings Tab -->
        <div id="settings-tab" class="tab-content active">
            <div class="section">
                <label for="apiKey">OpenRouter API Key</label>
                <input type="password" id="apiKey" placeholder="sk-or-v1-..." />
                <p class="hint">Get your key at <a href="https://openrouter.ai/keys"
                        target="_blank">openrouter.ai/keys</a></p>
            </div>

            <div class="section">
                <label for="tone">Comment Tone</label>
                <select id="tone">
                    <option value="thoughtful">🤔 Thoughtful</option>
                    <option value="friendly">😊 Friendly</option>
                    <option value="professional">💼 Professional</option>
                    <option value="curious">🧐 Curious</option>
                </select>
            </div>

            <div class="section">
                <label for="length">Comment Length</label>
                <select id="length">
                    <option value="100">📝 Short (~100 chars)</option>
                    <option value="200" selected>📄 Medium (~200 chars)</option>
                    <option value="350">📑 Long (~350 chars)</option>
                    <option value="500">📚 Very Long (~500 chars)</option>
                </select>
            </div>

            <div class="section">
                <label class="toggle-label">
                    <input type="checkbox" id="enabled" checked />
                    <span class="toggle-text">Extension Enabled</span>
                </label>
            </div>
        </div>

        <!-- Profile Tab -->
        <div id="profile-tab" class="tab-content">
            <div class="section">
                <label for="bio">About You</label>
                <textarea id="bio"
                    placeholder="Who are you? What do you write about? (e.g., 'I help indie creators grow their Substack...')"
                    rows="3"></textarea>
            </div>

            <div class="section">
                <label for="goals">Your Goals</label>
                <textarea id="goals"
                    placeholder="What are you trying to achieve? (e.g., 'Grow to 10k subscribers, establish authority in creator economy...')"
                    rows="2"></textarea>
            </div>

            <div class="section">
                <label for="topics">Topics You Cover</label>
                <textarea id="topics"
                    placeholder="List your main topics (e.g., 'digital products, audience growth, monetization, writing tips...')"
                    rows="2"></textarea>
            </div>

            <div class="section">
                <label for="style">Writing Style</label>
                <select id="style">
                    <option value="casual">💬 Casual & Conversational</option>
                    <option value="provocative">🔥 Provocative & Bold</option>
                    <option value="educational">📚 Educational & Helpful</option>
                    <option value="witty">😏 Witty & Clever</option>
                    <option value="inspirational">✨ Inspirational & Motivating</option>
                </select>
            </div>

            <div class="section">
                <label for="articles">Sample Content (Optional)</label>
                <textarea id="articles"
                    placeholder="Paste snippets from your best articles or notes to help the AI match your voice..."
                    rows="4"></textarea>
            </div>
        </div>

        <button id="saveBtn" class="save-btn">Save All</button>
        <div id="status" class="status"></div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
