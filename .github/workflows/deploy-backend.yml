name: Deploy Backend to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: safoantouil/narrative:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=safoantouil/narrative:buildcache
          cache-to: type=registry,ref=safoantouil/narrative:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i key.pem $EC2_USER@$EC2_HOST "
            sudo docker pull safoantouil/narrative:latest &&
            sudo docker stop narrative-backend || true &&
            sudo docker rm narrative-backend || true &&
            sudo docker run -d \
              --name narrative-backend \
              --restart always \
              -p 3002:3002 \
              --env-file /home/ubuntu/narrativee-backend/.env \
              safoantouil/narrative:latest &&
            sudo docker image prune -f
          "
          rm -f key.pem
