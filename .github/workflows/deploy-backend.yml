name: Deploy Backend to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: safoantouil/narrative:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=safoantouil/narrative:buildcache
          cache-to: type=registry,ref=safoantouil/narrative:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Update .env file (create if not exists)
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # Pull latest image
            sudo docker pull safoantouil/narrative:latest
            
            # Stop and remove existing container
            sudo docker stop narrative-backend || true
            sudo docker rm narrative-backend || true
            
            # Run new container
            sudo docker run -d \
              --name narrative-backend \
              --restart always \
              -p 3002:3002 \
              --env-file .env \
              safoantouil/narrative:latest
            
            # Cleanup unused images to save space
            sudo docker image prune -f
