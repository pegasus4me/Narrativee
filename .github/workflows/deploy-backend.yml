name: Deploy Backend to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: safoantouil/narrative:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=safoantouil/narrative:buildcache
          cache-to: type=registry,ref=safoantouil/narrative:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via webhook
        run: |
          curl -s -X POST "https://api.narrativee.com/api/deploy-hook" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_HOOK_SECRET }}" \
            --max-time 10 || true
