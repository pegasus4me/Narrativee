name: Deploy Backend to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: safoantouil/narrative:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=safoantouil/narrative:buildcache
          cache-to: type=registry,ref=safoantouil/narrative:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Notify image ready
        run: echo "✅ Image pushed to Docker Hub. SSH into EC2 and run: sudo docker pull safoantouil/narrative:latest && sudo docker stop narrative-backend && sudo docker rm narrative-backend && sudo docker run -d --name narrative-backend --restart always -p 3002:3002 --env-file /home/ubuntu/narrativee-backend/.env safoantouil/narrative:latest"
